<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Redirigiendo…</title>
  <!--
    =============================================
    404.html — Truco SPA para GitHub Pages
    =============================================
    GitHub Pages devuelve este archivo cuando una
    ruta como /empresa/ no existe como fichero real.
    Este script guarda la ruta en sessionStorage y
    redirige a index.html, que la recupera y la
    procesa como ruta de la SPA.

    Basado en la técnica de Rafael Pedicini:
    https://github.com/rafgraph/spa-github-pages
    =============================================
  -->
  <script>
    (function () {
      var fullPath = window.location.pathname + window.location.search + window.location.hash;
      // Solo guardamos si no es la raíz del proyecto
      if (fullPath !== '/qastilog/' && fullPath !== '/qastilog/index.html') {
        sessionStorage.setItem('spa-redirect', fullPath);
      }
      window.location.replace(window.location.origin + '/qastilog/');
    })();
        })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/" />
    <p>Redirigiendo… <a href="/">Haz clic aquí si no ocurre automáticamente.</a></p>
  </noscript>
</head>
<body>
  <!-- Esta página nunca se ve; solo ejecuta el redirect -->
</body>
</html>
